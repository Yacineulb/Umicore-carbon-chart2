<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Scope 1+2 Emissions vs SBTi Target</h2>

<canvas id="scope12Chart"></canvas>

<script>

const data = {
  labels: ['2019 Baseline', '2030 BAU', '2030 SBTi Target'],
  datasets: [{
    label: 'Emissions (t CO₂)',
    data: [791816, 609518, 395908],
    backgroundColor: [
      '#9E9E9E',  // grey baseline
      '#E74C3C',  // red BAU
      '#2ECC71'   // green target
    ]
  }]
};

const config = {
  type: 'bar',
  data: data,
  options: {
    plugins: {
      title: {
        display: true,
        text: 'Scope 1+2 Emissions: BAU vs SBTi Target'
      },
      legend: {
        display: false
      }
    },
    responsive: true,
    scales: {
      y: {
        title: {
          display: true,
          text: 't CO₂'
        }
      }
    }
  }
};

new Chart(
  document.getElementById('scope12Chart'),
  config
);

</script>

</body>
</html>
