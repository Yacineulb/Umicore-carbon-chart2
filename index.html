<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
</head>

<body>

<h2>Scope 1+2 Emissions vs SBTi Target</h2>

<canvas id="scope12Chart"></canvas>

<script>

const data = {
  labels: ['2019 Baseline', '2030 BAU', '2030 SBTi Target'],
  datasets: [{
    label: 'Emissions (t CO₂)',
    data: [791816, 609518, 395908],
    backgroundColor: [
      '#9E9E9E',
      '#E74C3C',
      '#2ECC71'
    ]
  }]
};

const config = {
  type: 'bar',
  data: data,
  options: {
    plugins: {
      legend: {
        display: false
      },
      title: {
        display: true,
        text: 'Scope 1+2 Emissions: BAU vs SBTi Target'
      },
      annotation: {
        annotations: {
          reductionArrow: {
            type: 'line',
            xMin: 1,
            xMax: 1,
            yMin: 395908,
            yMax: 609518,
            borderColor: 'black',
            borderWidth: 2,
            arrowHeads: {
              end: {
                display: true
              }
            },
            label: {
              display: true,
              content: '−213 kt CO₂ reduction',
              position: 'center'
            }
          }
        }
      }
    },
    scales: {
      y: {
        title: {
          display: true,
          text: 't CO₂'
        }
      }
    }
  }
};

new Chart(
  document.getElementById('scope12Chart'),
  config
);

</script>

</body>
</html>
