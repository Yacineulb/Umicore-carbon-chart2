<!DOCTYPE html>
<html>
<head>
<title>Scope 3 Emissions</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Scope 3 Emissions Intensity (Purchased Goods & Services)</h2>

<canvas id="scope3Chart" width="800" height="400"></canvas>

<script>

const labels = ['2019','2024','2025','2026','2027','2028','2029','2030'];

const data = {
  labels: labels,
  datasets: [
    {
      label: 'BAU Intensity',
      data: [2028,1543,1543,1543,1543,1543,1543,1543],
      borderColor: 'red',
      backgroundColor: 'red',
      fill: false,
      tension: 0.3
    },
    {
      label: 'SBTi Target Intensity',
      data: [2028,1543,1480,1418,1358,1299,1237,1176],
      borderColor: 'green',
      backgroundColor: 'green',
      fill: false,
      tension: 0.3
    }
  ]
};

const config = {
  type: 'line',
  data: data,
  options: {
    responsive: true,
    plugins: {
      title: {
        display: true,
        text: 'Scope 3 GHG Intensity Reduction Required'
      }
    },
    scales: {
      y: {
        title: {
          display: true,
          text: 'tCO2e / million EUR revenue'
        }
      }
    }
  }
};

const ctx = document.getElementById('scope3Chart').getContext('2d');
new Chart(ctx, config);

</script>

</body>
</html>
